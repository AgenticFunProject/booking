spring:
  datasource:
    url: ${TEST_DATABASE_URL:jdbc:postgresql://localhost:5432/booking_test}
    username: ${TEST_DB_USERNAME:booking_test}
    password: ${TEST_DB_PASSWORD:booking_test}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

app:
  security:
    enabled: true
  jwt:
    issuer: cargo-platform-test
    secret: ${JWT_SECRET:test-secret-key-that-is-at-least-256-bits-long}
    expiration: 3600s
