spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

app:
  security:
    enabled: true
    jwt:
      issuer: platform-auth
      audience: equipments-service
      secret: ${AUTH_JWT_SECRET:test-secret-key-that-is-at-least-256-bits-long}
      expiration-ms: 3600000
