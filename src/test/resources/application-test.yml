spring:
  main:
    banner-mode: off
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

app:
  security:
    enabled: true
    jwt:
      issuer: test-issuer
      audience: equipments-service
      secret: ${AUTH_JWT_SECRET:test-secret-key-that-is-at-least-256-bits-long}
      expiration-ms: 3600000
  integration:
    schedule-api:
      base-url: ${SCHEDULE_API_URL:http://localhost:8082}
      timeout-ms: ${SCHEDULE_API_TIMEOUT:1000}
    equipment-api:
      base-url: ${EQUIPMENT_API_URL:http://localhost:8083}
      timeout-ms: ${EQUIPMENT_API_TIMEOUT:1000}
    quote-api:
      base-url: ${QUOTE_API_URL:http://localhost:8084}
      timeout-ms: ${QUOTE_API_TIMEOUT:1000}
