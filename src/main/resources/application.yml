server:
  port: 8081
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    whitelabel:
      enabled: false

spring:
  application:
    name: booking-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booking_db}
    username: ${DB_USERNAME:booking_user}
    password: ${DB_PASSWORD:booking_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false
  mvc:
    throw-exception-if-no-handler-found: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      roles: ADMIN

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    # Override per instance when external API SLAs are known.
    instances: {}
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
    # Retry exceptions should be configured per instance based on actual client errors.
    instances: {}

app:
  api:
    base-path: /api/v1
  security:
    enabled: ${SECURITY_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    issuer: ${AUTH_JWT_ISSUER:platform-auth}
    audience: ${AUTH_JWT_AUDIENCE:equipments-service}
    secret: ${AUTH_JWT_SECRET:}
    expiration: ${AUTH_JWT_EXPIRATION:1h}
  integration:
    schedule-api:
      base-url: ${SCHEDULE_API_URL:http://localhost:8082}
      timeout-ms: ${SCHEDULE_API_TIMEOUT:5000}
    equipment-api:
      base-url: ${EQUIPMENT_API_URL:http://localhost:8083}
      timeout-ms: ${EQUIPMENT_API_TIMEOUT:5000}
    quote-api:
      base-url: ${QUOTE_API_URL:http://localhost:8084}
      timeout-ms: ${QUOTE_API_TIMEOUT:5000}
