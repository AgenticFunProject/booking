server:
  port: 8081

spring:
  application:
    name: booking-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booking_db}
    username: ${DB_USERNAME:booking_user}
    password: ${DB_PASSWORD:booking_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false
  mvc:
    throw-exception-if-no-handler-found: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

app:
  api:
    base-path: /api/v1
  security:
    enabled: ${SECURITY_ENABLED:true}
  jwt:
    issuer: ${AUTH_JWT_ISSUER:platform-auth}
    audience: ${AUTH_JWT_AUDIENCE:equipments-service}
    secret: ${AUTH_JWT_SECRET:}
    expiration: ${AUTH_JWT_EXPIRATION:1h}
