spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    open-in-view: false

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

app:
  security:
    enabled: true
    jwt:
      issuer: ${JWT_ISSUER:${AUTH_JWT_ISSUER:cargo-platform}}
      audience: ${JWT_AUDIENCE:${AUTH_JWT_AUDIENCE:equipments-service}}
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION:3600000}
  integration:
    schedule-api:
      base-url: ${SCHEDULE_API_URL:https://schedule-api.prod.cargo.internal}
      timeout-ms: ${SCHEDULE_API_TIMEOUT:5000}
    equipment-api:
      base-url: ${EQUIPMENT_API_URL:https://equipment-api.prod.cargo.internal}
      timeout-ms: ${EQUIPMENT_API_TIMEOUT:5000}
    quote-api:
      base-url: ${QUOTE_API_URL:https://quote-api.prod.cargo.internal}
      timeout-ms: ${QUOTE_API_TIMEOUT:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      show-components: never
      roles: ADMIN

logging:
  level:
    root: WARN
    com.cargo.booking: INFO
