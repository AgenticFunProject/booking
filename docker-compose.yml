services:
  postgres:
    image: postgres:16-alpine
    container_name: booking-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  booking-service:
    build: .
    container_name: booking-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/booking_db
      DB_USERNAME: booking_user
      DB_PASSWORD: booking_pass
      SECURITY_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
    restart: unless-stopped

volumes:
  postgres_data:
