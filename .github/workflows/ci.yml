name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run unit tests
        run: ./mvnw test -Dgroups="!integration,!e2e"

      - name: Run integration tests
        run: ./mvnw test -Dgroups="integration"

      - name: Run E2E tests
        run: ./mvnw test -Dgroups="e2e"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          if-no-files-found: warn

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: booking-service-jar
          path: target/booking-service-*.jar
          if-no-files-found: error

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t booking-service:${{ github.sha }} -t booking-service:bo-ot8.10 .

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Tag as latest
        if: github.ref == 'refs/heads/master'
        run: docker tag booking-service:${{ github.sha }} booking-service:latest
